apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: dex
  sources:
    - repoURL: https://charts.dexidp.io
      chart: dex
      targetRevision: 0.24.0
      helm:
        valueFiles:
          - $values/infrastructure/dex/values.yaml
    - repoURL: https://github.com/khanhcmlab/gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/khanhcmlab/gitops.git
      targetRevision: main
      path: infrastructure/dex
      directory:
        include: '*secret.yaml'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true