apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: default
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/component: externalname-service
spec:
  type: ExternalName
  externalName: forgejo.forgejo.svc.cluster.local
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP
