image:
  repository: codeberg.org/forgejo/forgejo
  tag: "9.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 3000
  sshPort: 22

persistence:
  enabled: true
  size: 20Gi
  storageClassName: ""
  accessMode: ReadWriteOnce

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector: {}

db:
  type: postgres
  host: forgejo-db-rw.forgejo.svc.cluster.local:5432
  name: forgejo
  user: forgejo
  existingSecret: forgejo-db-app
  secretPasswordKey: password

admin:
  existingSecret: forgejo-admin-secret

forgejo:
  appName: "Forgejo"
  domain: gitumame.khanhcm.site
  rootUrl: https://gitumame.khanhcm.site/
  disableRegistration: false
