apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgejo.fullname" . }}
  labels:
    {{- include "forgejo.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "forgejo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "forgejo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          env:
            - name: GITEA__database__DB_TYPE
              value: {{ .Values.db.type | quote }}
            - name: GITEA__database__HOST
              value: {{ .Values.db.host | quote }}
            - name: GITEA__database__NAME
              value: {{ .Values.db.name | quote }}
            - name: GITEA__database__USER
              value: {{ .Values.db.user | quote }}
            {{- if and .Values.db.existingSecret .Values.db.secretPasswordKey }}
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.existingSecret }}
                  key: {{ .Values.db.secretPasswordKey }}
            {{- end }}
            - name: GITEA__server__DOMAIN
              value: {{ .Values.forgejo.domain | quote }}
            - name: GITEA__server__ROOT_URL
              value: {{ .Values.forgejo.rootUrl | quote }}
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: {{ .Values.forgejo.disableRegistration | default false | quote }}
            {{- if .Values.admin.existingSecret }}
            - name: FORGEJO_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret }}
                  key: username
            - name: FORGEJO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret }}
                  key: password
            {{- end }}
          volumeMounts:
            - name: data-volume
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      volumes:
        - name: data-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "forgejo.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
