apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-db
  namespace: forgejo
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 10Gi
    storageClass: nfs-rwx


  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
  podSecurityContext:
    fsGroup: 26
