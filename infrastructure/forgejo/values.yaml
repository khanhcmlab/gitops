# Disable built-in postgresql dependencies in favor of CNPG
postgresql:
  enabled: false
postgresql-ha:
  enabled: false

gitea:
  config:
    APP_NAME: "Forgejo"
    server:
      DOMAIN: git.khanhcm.xyz
      ROOT_URL: https://git.khanhcm.xyz/
      HTTP_PORT: 3000
    database:
      DB_TYPE: postgres
      HOST: forgejo-db-rw.forgejo.svc.cluster.local:5432
      NAME: forgejo
      USER: forgejo

  # Admin configuration using Kubernetes Secret
  admin:
    existingSecret: forgejo-admin-secret

  # Map database password from CNPG-generated secret as an environment variable
  additionalConfigFromEnvs:
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-db-app
          key: password

# Node Selector matching dex and other infrastructure settings
nodeSelector:
  node: hp

# Resource allocation for stable execution
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Persistent storage configuration for repositories and metadata
persistence:
  enabled: true
  size: 20Gi
