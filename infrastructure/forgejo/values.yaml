image:
  tag: "9.0"

# Node Selector matching dex and other infrastructure settings
nodeSelector:
  node: hp

# Resource allocation for stable execution
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Persistent storage configuration for repositories and metadata
persistence:
  enabled: true
  size: 20Gi
  storageClassName: local-path


db:
  type: postgres
  host: forgejo-db-rw.forgejo.svc.cluster.local:5432
  name: forgejo
  user: forgejo
  existingSecret: forgejo-db-app
  secretPasswordKey: password

admin:
  existingSecret: forgejo-admin-secret

forgejo:
  appName: "Forgejo"
  domain: gitumame.khanhcm.site
  rootUrl: https://gitumame.khanhcm.site/
  disableRegistration: true
