apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: argocd
  labels:
    app.kubernetes.io/name: dex
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.dexidp.io
      chart: dex
      targetRevision: 0.19.1
      helm:
        valueFiles:
          - $values/infrastructure/dex/values.yaml
    - repoURL: git@github.com:khanhcmlab/gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: git@github.com:khanhcmlab/gitops.git
      targetRevision: HEAD
      path: infrastructure/dex
      plugin:
        name: sops-plugin
  destination:
    server: https://kubernetes.default.svc
    namespace: authentication
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true