apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: argocd
  labels:
    app.kubernetes.io/name: dex
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.dexidp.io
      chart: dex
      targetRevision: 0.19.1
      helm:
        valueFiles:
          - $values/infrastructure/dex/values.yaml
    - repoURL: https://github.com/khanhcmlab/gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/khanhcmlab/gitops.git
      targetRevision: HEAD
      path: infrastructure/dex
      directory:
        include: "{sealed-*.yaml,*-service.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true