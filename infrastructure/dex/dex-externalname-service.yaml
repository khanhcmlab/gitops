apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: default
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/component: externalname-service
spec:
  type: ExternalName
  externalName: dex.authentication.svc.cluster.local
  ports:
    - name: http
      port: 5556
      targetPort: 5556
      protocol: TCP
    - name: grpc
      port: 5558
      targetPort: 5558
      protocol: TCP