config:
  issuer: https://dexpacity.khanhcm.site
  storage:
    type: kubernetes
    config:
      inCluster: true

  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: https://dexpacity.khanhcm.site/callback
        orgs:
          - name: khanhcmlab
  staticClients:
    - id: argocd
      name: ArgoCD
      secretEnv: ARGOCD_CLIENT_SECRET
      redirectURIs:
        - https://argocd-chelsea.khanhcm.site/auth/callback

envFrom:
  - secretRef:
      name: dex-github-oauth
  - secretRef:
      name: dex-argocd-client

nodeSelector:
  node: gl

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
