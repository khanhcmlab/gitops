apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - name: gateway
      port: {{ .Values.openclaw.port }}
      targetPort: gateway
  selector:
    app.kubernetes.io/name: {{ include "openclaw.name" . }}
