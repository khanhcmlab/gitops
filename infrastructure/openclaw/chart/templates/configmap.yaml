apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
data:
  openclaw.json: |
    {
      "gateway": {
        "port": {{ .Values.openclaw.port }},
        "mode": "local",
        "trustedProxies": []
        {{- if .Values.openclaw.allowedOrigins }},
        "controlUi": {
          "allowedOrigins": {{ .Values.openclaw.allowedOrigins | toJson }}
        }
        {{- end }}
      },
      "browser": {
        "enabled": {{ .Values.chromium.enabled }},
        "defaultProfile": "default",
        "profiles": {
          "default": {
            "cdpUrl": "http://localhost:9222",
            "color": "#4285F4"
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "anthropic/claude-opus-4-6"
          },
          "userTimezone": "{{ .Values.openclaw.timezone }}",
          "timeoutSeconds": 600,
          "maxConcurrent": 1
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "OpenClaw",
              "emoji": "🦞"
            }
          }
        ]
      },
      "session": {
        "scope": "per-sender",
        "store": "/home/node/.openclaw/sessions",
        "reset": {
          "mode": "idle",
          "idleMinutes": 60
        }
      },
      "logging": {
        "level": "info",
        "consoleLevel": "info",
        "consoleStyle": "compact",
        "redactSensitive": "tools"
      },
      "tools": {
        "profile": "full",
        "web": {
          "search": { "enabled": false },
          "fetch": { "enabled": true }
        }
      }
    }
