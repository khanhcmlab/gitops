image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.5.22"
  pullPolicy: IfNotPresent

chromium:
  enabled: true
  image:
    repository: chromedp/headless-shell
    tag: "148.0.7778.97"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce
  storageClassName: ""

credentials:
  existingSecret: openclaw-env-secret

openclaw:
  bind: lan
  port: 18789
  canvasPort: 18793
  timezone: UTC
